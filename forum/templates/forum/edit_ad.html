{% extends "forum/base.html" %}

{% block title %}Editar anúncio{% endblock %}

{% block content %}
  <h2>Editar anúncio</h2>
  <form method="post" action="{% url 'forum:ad_edit' ad.id %}">
    {% csrf_token %}
    <div>
      <label for="titulo">Nome do veículo</label><br>
      <input type="text" id="titulo" name="titulo" value="{{ ad.titulo }}" required style="width:100%;">
    </div>
    <div style="margin-top:8px;">
      <label for="preco">Preço</label><br>
      <input type="text" id="preco" name="preco" value="{{ ad.preco }}" style="width:200px;">
    </div>
    <div style="margin-top:8px;">
      <label for="imagem_url">Imagem (URL)</label><br>
      <input type="text" id="imagem_url" name="imagem_url" value="{{ ad.imagem_url }}" style="width:100%;">
    </div>
    <div style="margin-top:8px;">
      <label for="descricao">Descrição</label><br>
      <textarea id="descricao" name="descricao" rows="6" style="width:100%;">{{ ad.descricao }}</textarea>
    </div>
    <div style="margin-top:8px;">
      <label for="vendedor">Nome do anunciante</label><br>
      <input type="text" id="vendedor" name="vendedor" value="{{ ad.vendedor }}" style="width:100%;" placeholder="Ex: João Silva">
    </div>
    <div style="margin-top:8px;">
      <label for="contato">Número para contato</label><br>
      <input type="text" id="contato" name="contato" value="{{ ad.contato }}" style="width:100%;" placeholder="Ex: 11 91234-5678">
    </div>
    <div style="margin-top:10px;">
      <input class="btn-primary" type="submit" value="Salvar alterações">
      <a href="{% url 'forum:ad_detail' ad.id %}"><button type="button">Cancelar</button></a>
    </div>
  </form>
{% endblock %}
